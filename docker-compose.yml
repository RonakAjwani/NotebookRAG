# Full stack: Qdrant + FastAPI backend + React frontend.
# Bring up with:  docker compose up --build
# The backend needs LLM keys - set them in backend/.env (see backend/.env.example).

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Point the app at the qdrant service inside the compose network,
      # overriding the localhost default from .env.
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ./backend/data:/app/data
    depends_on:
      qdrant:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  qdrant_storage:
